<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FacturApp">
<meta name="theme-color" content="#0d0d0f">
<title>FacturApp</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0d0d0f;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --bg4: #26262e;
    --border: #2e2e38;
    --amber: #f5a623;
    --amber-dim: #c4821a;
    --amber-glow: rgba(245,166,35,0.12);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --text: #f0f0f5;
    --text2: #9898aa;
    --text3: #5a5a6e;
    --radius: 14px;
    --radius-sm: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Inter', sans-serif; overflow: hidden; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #header { background: var(--bg); padding: 52px 20px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 0 calc(80px + var(--safe-bottom)); }
  #nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(13,13,15,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 4px; border: none; background: none; color: var(--text3); font-size: 10px; cursor: pointer; transition: color .2s; }
  .nav-btn.active { color: var(--amber); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* HEADER */
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .app-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--amber); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; color: #000; }
  .app-name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .app-name span { color: var(--amber); }
  .header-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--text2); }

  /* TABS */
  .tab-bar { display: flex; gap: 8px; padding: 16px 20px 0; }
  .tab { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text2); font-size: 13px; cursor: pointer; transition: all .2s; }
  .tab.active { background: var(--amber); border-color: var(--amber); color: #000; font-weight: 600; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 0 16px 12px; }
  .card-sm { padding: 12px 14px; margin-bottom: 8px; }

  /* DASHBOARD */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
  .kpi { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 700; letter-spacing: -1px; }
  .kpi-value.income { color: var(--green); }
  .kpi-value.expense { color: var(--red); }
  .kpi-value.amber { color: var(--amber); }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .kpi-full { grid-column: 1 / -1; }

  /* TIMELINE STRIP — signature element */
  .timeline-strip { margin: 0 16px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .timeline-header { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: center; }
  .timeline-label { font-size: 12px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .timeline-track { height: 36px; display: flex; align-items: center; padding: 0 14px 12px; gap: 3px; }
  .timeline-seg { height: 20px; border-radius: 3px; transition: opacity .2s; cursor: pointer; position: relative; min-width: 2px; }
  .timeline-seg:hover { opacity: .8; }
  .timeline-months { display: flex; padding: 0 14px 10px; }
  .timeline-month { font-size: 9px; color: var(--text3); text-align: center; flex: 1; }

  /* INVOICE LIST */
  .section-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; padding: 16px 16px 8px; }
  .invoice-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 0 16px 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color .2s; }
  .invoice-item:active { border-color: var(--amber); }
  .invoice-dot { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .invoice-dot.income { background: var(--green-dim); }
  .invoice-dot.expense { background: var(--red-dim); }
  .invoice-dot svg { width: 16px; height: 16px; }
  .invoice-dot.income svg { color: var(--green); }
  .invoice-dot.expense svg { color: var(--red); }
  .invoice-info { flex: 1; min-width: 0; }
  .invoice-client { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .invoice-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .invoice-amount { text-align: right; flex-shrink: 0; }
  .invoice-total { font-size: 15px; font-weight: 700; }
  .invoice-total.income { color: var(--green); }
  .invoice-total.expense { color: var(--red); }
  .invoice-status { font-size: 11px; margin-top: 2px; }
  .status-paid { color: var(--green); }
  .status-pending { color: var(--amber); }
  .status-draft { color: var(--text3); }

  /* FAB */
  .fab { position: fixed; bottom: calc(80px + var(--safe-bottom) + 16px); right: 20px; width: 52px; height: 52px; background: var(--amber); border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(245,166,35,.4); z-index: 99; transition: transform .15s; }
  .fab:active { transform: scale(.93); }
  .fab svg { width: 22px; height: 22px; color: #000; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: flex-end; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding: 0 0 calc(20px + var(--safe-bottom)); transform: translateY(100%); transition: transform .3s cubic-bezier(.32,1,.5,1); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .modal-title { font-size: 17px; font-weight: 700; padding: 16px 20px 20px; }
  .modal-section { padding: 0 20px 16px; }
  .modal-section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; font-weight: 600; }

  /* FORM */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); padding: 11px 12px; font-size: 15px; font-family: inherit; outline: none;
    transition: border-color .2s; appearance: none; -webkit-appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--amber); }
  .field textarea { min-height: 80px; resize: none; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .computed-field { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; font-size: 15px; color: var(--text2); }
  .computed-field.highlight { color: var(--amber); font-weight: 600; }

  /* TYPE SELECTOR */
  .type-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .type-opt { padding: 12px; border-radius: var(--radius-sm); border: 2px solid var(--border); text-align: center; cursor: pointer; transition: all .2s; }
  .type-opt .type-icon { font-size: 22px; margin-bottom: 4px; }
  .type-opt .type-label { font-size: 13px; font-weight: 600; }
  .type-opt.selected-income { border-color: var(--green); background: var(--green-dim); }
  .type-opt.selected-income .type-label { color: var(--green); }
  .type-opt.selected-expense { border-color: var(--red); background: var(--red-dim); }
  .type-opt.selected-expense .type-label { color: var(--red); }

  /* FILE UPLOAD */
  .upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: border-color .2s; position: relative; overflow: hidden; }
  .upload-area:hover, .upload-area.dragover { border-color: var(--amber); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { width: 32px; height: 32px; margin: 0 auto 8px; color: var(--text3); }
  .upload-text { font-size: 13px; color: var(--text2); }
  .upload-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .uploaded-file { display: flex; align-items: center; gap: 10px; background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 10px; }
  .uploaded-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: var(--bg4); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .uploaded-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .uploaded-remove { width: 28px; height: 28px; background: var(--red-dim); border-radius: 50%; border: none; color: var(--red); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* OCR */
  .ocr-btn { width: 100%; padding: 12px; background: var(--amber-glow); border: 1px solid var(--amber-dim); border-radius: var(--radius-sm); color: var(--amber); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; transition: background .2s; }
  .ocr-btn:active { background: rgba(245,166,35,.2); }
  .ocr-status { font-size: 12px; color: var(--text2); text-align: center; padding: 8px; }
  .ocr-processing { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* BUTTONS */
  .btn-primary { width: 100%; padding: 14px; background: var(--amber); border: none; border-radius: var(--radius-sm); color: #000; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
  .btn-primary:active { opacity: .85; }
  .btn-secondary { width: 100%; padding: 13px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 15px; cursor: pointer; margin-top: 8px; }
  .btn-danger { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }

  /* DETAIL VIEW */
  .detail-header { padding: 16px 20px; }
  .detail-type-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
  .detail-type-badge.income { background: var(--green-dim); color: var(--green); }
  .detail-type-badge.expense { background: var(--red-dim); color: var(--red); }
  .detail-client { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .detail-num { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .detail-amount-big { font-size: 36px; font-weight: 800; letter-spacing: -2px; margin: 16px 0 4px; }
  .detail-amount-big.income { color: var(--green); }
  .detail-amount-big.expense { color: var(--red); }
  .detail-breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 20px; }
  .breakdown-item { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
  .breakdown-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .3px; }
  .breakdown-value { font-size: 14px; font-weight: 700; margin-top: 3px; }
  .detail-doc-preview { margin: 0 20px 16px; border-radius: var(--radius); overflow: hidden; background: var(--bg3); border: 1px solid var(--border); }
  .detail-doc-preview img { width: 100%; max-height: 200px; object-fit: cover; }
  .detail-doc-pdf { padding: 20px; text-align: center; }

  /* QUARTERLY */
  .quarter-selector { display: flex; overflow-x: auto; gap: 8px; padding: 12px 16px; scrollbar-width: none; }
  .quarter-selector::-webkit-scrollbar { display: none; }
  .quarter-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text2); font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .quarter-btn.active { background: var(--amber); border-color: var(--amber); color: #000; font-weight: 600; }
  .chart-container { margin: 0 16px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
  .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .bars { display: flex; gap: 3px; align-items: flex-end; width: 100%; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 2px; transition: height .5s cubic-bezier(.34,1.56,.64,1); }
  .bar.income-bar { background: var(--green); }
  .bar.expense-bar { background: var(--red); }
  .bar-label { font-size: 9px; color: var(--text3); }
  .chart-legend { display: flex; gap: 16px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .summary-row:last-child { border-bottom: none; }
  .summary-key { font-size: 14px; color: var(--text2); }
  .summary-val { font-size: 14px; font-weight: 700; }
  .tax-alert { background: var(--amber-glow); border: 1px solid var(--amber-dim); border-radius: var(--radius); padding: 14px; margin: 0 16px 16px; display: flex; gap: 10px; align-items: flex-start; }
  .tax-alert svg { width: 18px; height: 18px; color: var(--amber); flex-shrink: 0; margin-top: 1px; }
  .tax-alert-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .tax-alert-text strong { color: var(--amber); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: .4; }
  .empty p { font-size: 15px; margin-bottom: 6px; color: var(--text2); }
  .empty small { font-size: 13px; }

  /* DETAIL MODAL */
  .detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 20px; }

  /* TOAST */
  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; font-size: 14px; white-space: nowrap; z-index: 999; opacity: 0; transition: all .3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-top">
      <div class="app-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <span class="app-name">Factur<span>App</span></span>
      </div>
      <div class="header-badge" id="year-badge">2026</div>
    </div>
  </div>

  <div id="content"></div>

  <nav id="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showView('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Inicio
    </button>
    <button class="nav-btn" id="nav-income" onclick="showView('income')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      Ingresos
    </button>
    <button class="nav-btn" id="nav-expense" onclick="showView('expense')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
      Gastos
    </button>
    <button class="nav-btn" id="nav-quarterly" onclick="showView('quarterly')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Análisis
    </button>
  </nav>
</div>

<button class="fab" onclick="openNewModal()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- NEW/EDIT MODAL -->
<div class="modal-overlay" id="new-modal" onclick="closeModalOutside(event,'new-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nueva entrada</div>

    <div class="modal-section">
      <div class="type-selector" id="type-selector">
        <div class="type-opt" id="opt-income" onclick="selectType('income')">
          <div class="type-icon">📈</div>
          <div class="type-label">Ingreso / Venta</div>
        </div>
        <div class="type-opt" id="opt-expense" onclick="selectType('expense')">
          <div class="type-icon">📉</div>
          <div class="type-label">Gasto / Compra</div>
        </div>
      </div>

      <!-- FILE UPLOAD -->
      <div class="modal-section-title">Documento (opcional)</div>
      <div class="upload-area" id="upload-area" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleFileDrop(event)">
        <input type="file" id="file-input" accept="image/*,application/pdf" onchange="handleFileChange(event)">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="upload-text">Sube foto o PDF del tiquet</div>
        <div class="upload-sub">JPG, PNG, PDF • Tap para elegir</div>
      </div>
      <div id="file-preview"></div>
      <button class="ocr-btn" id="ocr-btn" style="display:none; margin-top:10px;" onclick="runOCR()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Analizar con IA y rellenar datos
      </button>
      <div class="ocr-status" id="ocr-status"></div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Datos de la factura</div>
      <div class="field">
        <label>Cliente / Proveedor *</label>
        <input type="text" id="f-client" placeholder="Nombre o empresa">
      </div>
      <div class="field">
        <label>Número de factura</label>
        <input type="text" id="f-num" placeholder="Ej: F2026-001">
      </div>
      <div class="field">
        <label>Descripción / Concepto</label>
        <input type="text" id="f-desc" placeholder="Ej: Producción vídeo corporativo">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label>Categoría</label>
          <select id="f-category">
            <option value="">— Elige —</option>
            <optgroup label="Ingresos">
              <option value="produccion">Producción</option>
              <option value="postproduccion">Postproducción</option>
              <option value="fotografia">Fotografía</option>
              <option value="streaming">Streaming / Live</option>
              <option value="otros-ing">Otros ingresos</option>
            </optgroup>
            <optgroup label="Gastos">
              <option value="equipo">Equipo / Hardware</option>
              <option value="software">Software / Suscripciones</option>
              <option value="transporte">Transporte</option>
              <option value="alquiler">Alquiler material</option>
              <option value="suministros">Suministros</option>
              <option value="autonomo">Cuota autónomo</option>
              <option value="otros-gas">Otros gastos</option>
            </optgroup>
          </select>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Importes</div>
      <div class="field-row">
        <div class="field">
          <label>Base imponible (€)</label>
          <input type="number" id="f-base" placeholder="0.00" step="0.01" oninput="calcAmounts()">
        </div>
        <div class="field">
          <label>IVA (%)</label>
          <input type="number" id="f-iva" value="21" step="0.5" oninput="calcAmounts()">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>IRPF (%) <span style="color:var(--text3);font-size:11px" id="irpf-label">retención</span></label>
          <input type="number" id="f-irpf" value="15" step="0.5" oninput="calcAmounts()">
        </div>
        <div class="field">
          <label>Estado</label>
          <select id="f-status">
            <option value="pending">Pendiente</option>
            <option value="paid">Cobrada/Pagada</option>
            <option value="draft">Borrador</option>
          </select>
        </div>
      </div>

      <div class="field-row-3" style="margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:5px">IVA (€)</div>
          <div class="computed-field" id="c-iva">0.00</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:5px">IRPF (€)</div>
          <div class="computed-field" id="c-irpf">0.00</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:5px">TOTAL (€)</div>
          <div class="computed-field highlight" id="c-total">0.00</div>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <button class="btn-primary" onclick="saveEntry()">Guardar</button>
      <button class="btn-secondary" id="delete-btn" style="display:none;color:var(--red);border-color:var(--red)" onclick="deleteEntry()">Eliminar</button>
      <button class="btn-secondary" onclick="closeModal('new-modal')">Cancelar</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal" onclick="closeModalOutside(event,'detail-modal')">
  <div class="modal" id="detail-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================
// STATE & STORAGE
// ============================
let state = { entries: [], currentView: 'dashboard', editingId: null, selectedType: 'income', uploadedFile: null, uploadedFileType: null };

function loadState() {
  try {
    const saved = localStorage.getItem('facturapp_data');
    if (saved) { const d = JSON.parse(saved); state.entries = d.entries || []; }
  } catch(e) {}
  // Seed with demo data if empty
  if (state.entries.length === 0) seedDemo();
}

function saveState() {
  try { localStorage.setItem('facturapp_data', JSON.stringify({ entries: state.entries })); } catch(e) {}
}

function seedDemo() {
  const now = new Date();
  const y = now.getFullYear();
  const demos = [
    { id: uid(), type: 'income', client: 'Acme Producciones', num: `F${y}-001`, desc: 'Vídeo corporativo 3 días', date: `${y}-01-15`, base: 3200, iva: 21, irpf: 15, status: 'paid', category: 'produccion', file: null },
    { id: uid(), type: 'income', client: 'Restaurante El Olivo', num: `F${y}-002`, desc: 'Sesión fotográfica menú', date: `${y}-02-10`, base: 800, iva: 21, irpf: 15, status: 'paid', category: 'fotografia', file: null },
    { id: uid(), type: 'income', client: 'Fundación Arte', num: `F${y}-003`, desc: 'Streaming evento gala', date: `${y}-03-22`, base: 1500, iva: 21, irpf: 15, status: 'pending', category: 'streaming', file: null },
    { id: uid(), type: 'expense', client: 'Adobe', num: 'REC-001', desc: 'Suscripción Creative Cloud', date: `${y}-01-01`, base: 54.99, iva: 21, irpf: 0, status: 'paid', category: 'software', file: null },
    { id: uid(), type: 'expense', client: 'B&H Photo', num: 'REC-002', desc: 'Batería Sony NP-FZ100', date: `${y}-02-05`, base: 89, iva: 21, irpf: 0, status: 'paid', category: 'equipo', file: null },
    { id: uid(), type: 'expense', client: 'TGSS', num: 'REC-003', desc: 'Cuota autónomo enero', date: `${y}-01-31`, base: 294.38, iva: 0, irpf: 0, status: 'paid', category: 'autonomo', file: null },
    { id: uid(), type: 'expense', client: 'TGSS', num: 'REC-004', desc: 'Cuota autónomo febrero', date: `${y}-02-28`, base: 294.38, iva: 0, irpf: 0, status: 'paid', category: 'autonomo', file: null },
    { id: uid(), type: 'income', client: 'Tech Startup SL', num: `F${y}-004`, desc: 'Postproducción vídeo pitch', date: `${y}-04-08`, base: 2100, iva: 21, irpf: 15, status: 'paid', category: 'postproduccion', file: null },
    { id: uid(), type: 'income', client: 'Ayuntamiento Murcia', num: `F${y}-005`, desc: 'Cobertura evento cultural', date: `${y}-05-15`, base: 1800, iva: 21, irpf: 15, status: 'pending', category: 'produccion', file: null },
    { id: uid(), type: 'expense', client: 'Leica Store', num: 'REC-005', desc: 'Alquiler objetivo 24-70', date: `${y}-04-07`, base: 120, iva: 21, irpf: 0, status: 'paid', category: 'alquiler', file: null },
  ];
  state.entries = demos;
  saveState();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ============================
// CALCULATIONS
// ============================
function calcEntry(e) {
  const base = parseFloat(e.base) || 0;
  const ivaAmt = base * (parseFloat(e.iva) / 100);
  const irpfAmt = e.type === 'income' ? base * (parseFloat(e.irpf) / 100) : 0;
  const total = e.type === 'income' ? base + ivaAmt - irpfAmt : base + ivaAmt;
  return { base, ivaAmt, irpfAmt, total };
}

function calcAmounts() {
  const base = parseFloat(document.getElementById('f-base').value) || 0;
  const iva = parseFloat(document.getElementById('f-iva').value) || 0;
  const irpf = parseFloat(document.getElementById('f-irpf').value) || 0;
  const ivaAmt = base * iva / 100;
  const irpfAmt = state.selectedType === 'income' ? base * irpf / 100 : 0;
  const total = state.selectedType === 'income' ? base + ivaAmt - irpfAmt : base + ivaAmt;
  document.getElementById('c-iva').textContent = ivaAmt.toFixed(2);
  document.getElementById('c-irpf').textContent = irpfAmt.toFixed(2);
  document.getElementById('c-total').textContent = total.toFixed(2);
}

// ============================
// FORMAT HELPERS
// ============================
function fmtEur(n) { return new Intl.NumberFormat('es-ES', { style:'currency', currency:'EUR', minimumFractionDigits:2 }).format(n); }
function fmtDate(d) { if (!d) return '—'; const dt = new Date(d+'T12:00:00'); return dt.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'2-digit' }); }
function getQ(dateStr) { const m = new Date(dateStr+'T12:00:00').getMonth(); return Math.floor(m/3)+1; }
function getYear(dateStr) { return new Date(dateStr+'T12:00:00').getFullYear(); }
const MONTHS_ES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const CAT_LABELS = { produccion:'Producción', postproduccion:'Postproducción', fotografia:'Fotografía', streaming:'Streaming', 'otros-ing':'Otros', equipo:'Equipo', software:'Software', transporte:'Transporte', alquiler:'Alquiler', suministros:'Suministros', autonomo:'Cuota autónomo', 'otros-gas':'Otros' };
const STATUS_LABELS = { paid:'Cobrada', pending:'Pendiente', draft:'Borrador' };

// ============================
// VIEWS
// ============================
function showView(v) {
  state.currentView = v;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + v)?.classList.add('active');
  const content = document.getElementById('content');

  if (v === 'dashboard') content.innerHTML = renderDashboard();
  else if (v === 'income') content.innerHTML = renderList('income');
  else if (v === 'expense') content.innerHTML = renderList('expense');
  else if (v === 'quarterly') content.innerHTML = renderQuarterly();

  // animate bars after render
  setTimeout(() => animateBars(), 50);
}

// ---- DASHBOARD ----
function renderDashboard() {
  const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
  const curQ = Math.floor(m/3)+1;
  const yearEntries = state.entries.filter(e => getYear(e.date) === y);
  const incomes = yearEntries.filter(e => e.type === 'income');
  const expenses = yearEntries.filter(e => e.type === 'expense');
  const totalIncome = incomes.reduce((s,e) => s + calcEntry(e).base, 0);
  const totalExpense = expenses.reduce((s,e) => s + calcEntry(e).base, 0);
  const totalIva = incomes.reduce((s,e) => s + calcEntry(e).ivaAmt, 0) - expenses.reduce((s,e) => s + calcEntry(e).ivaAmt, 0);
  const totalIrpf = incomes.reduce((s,e) => s + calcEntry(e).irpfAmt, 0);
  const benefit = totalIncome - totalExpense;

  // Timeline data
  const monthData = Array.from({length:12}, (_,i) => {
    const inc = yearEntries.filter(e => e.type==='income' && new Date(e.date+'T12:00:00').getMonth()===i).reduce((s,e) => s+calcEntry(e).base, 0);
    const exp = yearEntries.filter(e => e.type==='expense' && new Date(e.date+'T12:00:00').getMonth()===i).reduce((s,e) => s+calcEntry(e).base, 0);
    return { inc, exp };
  });
  const maxVal = Math.max(...monthData.map(d => Math.max(d.inc, d.exp)), 1);

  const timelineSegs = monthData.map((d,i) => {
    const wInc = (d.inc/maxVal)*100; const wExp = (d.exp/maxVal)*100;
    const isActive = i <= m;
    const alpha = isActive ? 1 : 0.3;
    return `<div style="flex:1;display:flex;flex-direction:column;gap:2px;opacity:${alpha}">
      <div class="timeline-seg" style="background:var(--green);height:${Math.max(wInc*0.5,2)}%;width:100%"></div>
      <div class="timeline-seg" style="background:var(--red);height:${Math.max(wExp*0.5,2)}%;width:100%"></div>
    </div>`;
  }).join('');

  const recentEntries = [...state.entries].sort((a,b) => b.date.localeCompare(a.date)).slice(0,5);

  return `
  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-label">Ingresos ${y}</div>
      <div class="kpi-value income">${fmtEur(totalIncome)}</div>
      <div class="kpi-sub">${incomes.length} facturas</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Gastos ${y}</div>
      <div class="kpi-value expense">${fmtEur(totalExpense)}</div>
      <div class="kpi-sub">${expenses.length} gastos</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Resultado neto</div>
      <div class="kpi-value amber">${fmtEur(benefit)}</div>
      <div class="kpi-sub">sin impuestos</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">IVA a declarar</div>
      <div class="kpi-value amber">${fmtEur(Math.max(totalIva,0))}</div>
      <div class="kpi-sub">IVA rep. − IVA sop.</div>
    </div>
    <div class="kpi kpi-full" style="background:var(--amber-glow);border-color:var(--amber-dim)">
      <div class="kpi-label">IRPF retenido (retenciones clientes)</div>
      <div class="kpi-value amber">${fmtEur(totalIrpf)}</div>
      <div class="kpi-sub">ya descontado de tus facturas</div>
    </div>
  </div>

  <div class="timeline-strip">
    <div class="timeline-header">
      <span class="timeline-label">Actividad ${y}</span>
      <span style="font-size:11px;color:var(--text3)">T${curQ} activo</span>
    </div>
    <div class="timeline-track" style="height:60px;align-items:flex-end;padding-bottom:0">
      ${timelineSegs}
    </div>
    <div class="timeline-months">${MONTHS_ES.map(l=>`<span class="timeline-month">${l}</span>`).join('')}</div>
  </div>

  <div class="section-title">Últimas entradas</div>
  ${recentEntries.length ? recentEntries.map(e => renderEntryItem(e)).join('') : '<div class="empty"><p>Sin entradas aún</p><small>Pulsa + para añadir</small></div>'}
  `;
}

// ---- LIST ----
function renderList(type) {
  const entries = [...state.entries].filter(e => e.type === type).sort((a,b) => b.date.localeCompare(a.date));
  const total = entries.reduce((s,e) => s + calcEntry(e).base, 0);
  const paid = entries.filter(e => e.status === 'paid').reduce((s,e) => s + calcEntry(e).base, 0);
  const pending = entries.filter(e => e.status === 'pending').reduce((s,e) => s + calcEntry(e).base, 0);
  const label = type === 'income' ? 'Ingresos' : 'Gastos';
  const color = type === 'income' ? 'var(--green)' : 'var(--red)';

  return `
  <div class="kpi-grid" style="padding-bottom:4px">
    <div class="kpi kpi-full">
      <div class="kpi-label">Total ${label} ${new Date().getFullYear()}</div>
      <div class="kpi-value" style="color:${color}">${fmtEur(total)}</div>
    </div>
    <div class="kpi"><div class="kpi-label">${type==='income'?'Cobrado':'Pagado'}</div><div class="kpi-value" style="font-size:16px;color:${color}">${fmtEur(paid)}</div></div>
    <div class="kpi"><div class="kpi-label">Pendiente</div><div class="kpi-value" style="font-size:16px;color:var(--amber)">${fmtEur(pending)}</div></div>
  </div>
  <div class="section-title">${label} (${entries.length})</div>
  ${entries.length ? entries.map(e => renderEntryItem(e)).join('') : `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Sin ${label.toLowerCase()} aún</p><small>Pulsa + para añadir</small></div>`}
  `;
}

function renderEntryItem(e) {
  const { total } = calcEntry(e);
  const statusClass = { paid:'status-paid', pending:'status-pending', draft:'status-draft' }[e.status];
  const statusLabel = STATUS_LABELS[e.status];
  const isIncome = e.type === 'income';
  const icon = isIncome
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>`;
  return `<div class="invoice-item" onclick="openDetail('${e.id}')">
    <div class="invoice-dot ${e.type}">${icon}</div>
    <div class="invoice-info">
      <div class="invoice-client">${e.client || '—'}</div>
      <div class="invoice-meta">${fmtDate(e.date)} · ${CAT_LABELS[e.category] || 'Sin categoría'}</div>
    </div>
    <div class="invoice-amount">
      <div class="invoice-total ${e.type}">${isIncome ? '+' : '-'}${fmtEur(total)}</div>
      <div class="invoice-status ${statusClass}">${statusLabel}</div>
    </div>
  </div>`;
}

// ---- QUARTERLY ----
function renderQuarterly(activeQ, activeY) {
  const now = new Date();
  const curY = activeY || now.getFullYear();
  const curQ = activeQ || Math.floor(now.getMonth()/3)+1;

  const years = [...new Set(state.entries.map(e => getYear(e.date)))].sort((a,b)=>b-a);
  if (!years.includes(curY)) years.unshift(curY);

  const qEntries = state.entries.filter(e => getYear(e.date)===curY && getQ(e.date)===curQ);
  const incQ = qEntries.filter(e => e.type==='income');
  const expQ = qEntries.filter(e => e.type==='expense');
  const baseInc = incQ.reduce((s,e) => s+calcEntry(e).base, 0);
  const baseExp = expQ.reduce((s,e) => s+calcEntry(e).base, 0);
  const ivaRep = incQ.reduce((s,e) => s+calcEntry(e).ivaAmt, 0);
  const ivaSop = expQ.reduce((s,e) => s+calcEntry(e).ivaAmt, 0);
  const irpfRet = incQ.reduce((s,e) => s+calcEntry(e).irpfAmt, 0);
  const ivaDiff = ivaRep - ivaSop;
  const benefit = baseInc - baseExp;

  // Monthly breakdown for chart
  const qMonths = [0,1,2].map(i => {
    const mIdx = (curQ-1)*3 + i;
    const inc = state.entries.filter(e => e.type==='income' && getYear(e.date)===curY && new Date(e.date+'T12:00:00').getMonth()===mIdx).reduce((s,e)=>s+calcEntry(e).base,0);
    const exp = state.entries.filter(e => e.type==='expense' && getYear(e.date)===curY && new Date(e.date+'T12:00:00').getMonth()===mIdx).reduce((s,e)=>s+calcEntry(e).base,0);
    return { label: MONTHS_ES[mIdx], inc, exp };
  });
  const maxBar = Math.max(...qMonths.map(m=>Math.max(m.inc,m.exp)),1);

  const barsHTML = qMonths.map(m => `
    <div class="bar-group">
      <div class="bars">
        <div class="bar income-bar" data-h="${(m.inc/maxBar*100).toFixed(1)}" style="height:2px"></div>
        <div class="bar expense-bar" data-h="${(m.exp/maxBar*100).toFixed(1)}" style="height:2px"></div>
      </div>
      <div class="bar-label">${m.label}</div>
    </div>`).join('');

  const qBtns = [1,2,3,4].map(q => `<button class="quarter-btn${q===curQ?' active':''}" onclick="switchQuarter(${q},${curY})">T${q} ${curY}</button>`);
  const prevY = curY - 1;
  const prevYBtns = [1,2,3,4].map(q => `<button class="quarter-btn" onclick="switchQuarter(${q},${prevY})">T${q} ${prevY}</button>`);

  const pct = baseInc > 0 ? ((benefit/baseInc)*100).toFixed(1) : 0;

  return `
  <div class="quarter-selector">${qBtns.join('')}${prevYBtns.join('')}</div>

  <div class="kpi-grid" style="padding-top:4px">
    <div class="kpi"><div class="kpi-label">Ingresos base</div><div class="kpi-value income" style="font-size:18px">${fmtEur(baseInc)}</div></div>
    <div class="kpi"><div class="kpi-label">Gastos base</div><div class="kpi-value expense" style="font-size:18px">${fmtEur(baseExp)}</div></div>
    <div class="kpi kpi-full"><div class="kpi-label">Beneficio neto T${curQ} · margen ${pct}%</div><div class="kpi-value amber">${fmtEur(benefit)}</div></div>
  </div>

  <div class="chart-container">
    <div class="chart-title">Ingresos vs Gastos — T${curQ} ${curY}</div>
    <div class="bar-chart">${barsHTML}</div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Ingresos</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Gastos</div>
    </div>
  </div>

  <div class="tax-alert">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <div class="tax-alert-text">
      <strong>Declaración T${curQ}:</strong> IVA a ingresar <strong>${fmtEur(Math.max(ivaDiff,0))}</strong> · IRPF retenido <strong>${fmtEur(irpfRet)}</strong>. Modelo 303 e IRPF a presentar antes de fin de mes siguiente al trimestre.
    </div>
  </div>

  <div class="card">
    <div class="chart-title" style="margin-bottom:12px">Resumen fiscal T${curQ}</div>
    <div class="summary-row"><span class="summary-key">IVA repercutido (ventas)</span><span class="summary-val" style="color:var(--red)">${fmtEur(ivaRep)}</span></div>
    <div class="summary-row"><span class="summary-key">IVA soportado (gastos)</span><span class="summary-val" style="color:var(--green)">${fmtEur(ivaSop)}</span></div>
    <div class="summary-row"><span class="summary-key" style="font-weight:600">IVA a ingresar (Mod. 303)</span><span class="summary-val amber" style="color:var(--amber)">${fmtEur(Math.max(ivaDiff,0))}</span></div>
    <div class="summary-row"><span class="summary-key">IRPF retenido por clientes</span><span class="summary-val" style="color:var(--amber)">${fmtEur(irpfRet)}</span></div>
    <div class="summary-row"><span class="summary-key">Facturas emitidas</span><span class="summary-val">${incQ.length}</span></div>
    <div class="summary-row"><span class="summary-key">Gastos registrados</span><span class="summary-val">${expQ.length}</span></div>
  </div>
  `;
}

function switchQuarter(q, y) {
  document.getElementById('content').innerHTML = renderQuarterly(q, y);
  setTimeout(() => animateBars(), 50);
}

function animateBars() {
  document.querySelectorAll('.bar[data-h]').forEach(b => {
    requestAnimationFrame(() => { b.style.height = b.dataset.h + '%'; });
  });
}

// ============================
// MODALS
// ============================
function openNewModal(prefillType) {
  state.editingId = null;
  state.uploadedFile = null;
  state.uploadedFileType = null;
  document.getElementById('modal-title').textContent = 'Nueva entrada';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('file-preview').innerHTML = '';
  document.getElementById('ocr-btn').style.display = 'none';
  document.getElementById('ocr-status').textContent = '';
  document.getElementById('file-input').value = '';

  // reset fields
  ['f-client','f-num','f-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-iva').value = '21';
  document.getElementById('f-irpf').value = '15';
  document.getElementById('f-status').value = 'pending';
  document.getElementById('f-base').value = '';
  document.getElementById('f-category').value = '';
  calcAmounts();

  selectType(prefillType || (state.currentView === 'expense' ? 'expense' : 'income'));
  openModal('new-modal');
}

function openDetail(id) {
  const e = state.entries.find(x => x.id === id);
  if (!e) return;
  const { base, ivaAmt, irpfAmt, total } = calcEntry(e);

  let docHTML = '';
  if (e.file) {
    if (e.fileType && e.fileType.startsWith('image/')) {
      docHTML = `<div class="detail-doc-preview"><img src="${e.file}" alt="Documento"></div>`;
    } else {
      docHTML = `<div class="detail-doc-preview"><div class="detail-doc-pdf"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div style="font-size:13px;color:var(--text2);margin-top:8px">Documento PDF adjunto</div><a href="${e.file}" download="factura.pdf" style="display:inline-block;margin-top:8px;color:var(--amber);font-size:13px">Descargar PDF</a></div></div>`;
    }
  }

  document.getElementById('detail-content').innerHTML = `
    <div class="modal-handle"></div>
    <div class="detail-header">
      <div class="detail-type-badge ${e.type}">${e.type==='income'?'📈 Ingreso':'📉 Gasto'}</div>
      <div class="detail-client">${e.client || '—'}</div>
      <div class="detail-num">${e.num || 'Sin número'} · ${fmtDate(e.date)}</div>
      <div class="detail-amount-big ${e.type}">${fmtEur(total)}</div>
      <div style="font-size:13px;color:var(--text2)">${e.desc || 'Sin descripción'}</div>
    </div>
    <div class="detail-breakdown">
      <div class="breakdown-item"><div class="breakdown-label">Base</div><div class="breakdown-value">${fmtEur(base)}</div></div>
      <div class="breakdown-item"><div class="breakdown-label">IVA ${e.iva}%</div><div class="breakdown-value">${fmtEur(ivaAmt)}</div></div>
      <div class="breakdown-item"><div class="breakdown-label">IRPF ${e.irpf}%</div><div class="breakdown-value">${fmtEur(irpfAmt)}</div></div>
    </div>
    ${docHTML}
    <div class="detail-actions">
      <button class="btn-secondary" onclick="editEntry('${e.id}')">✏️ Editar</button>
      <button class="btn-secondary" onclick="closeModal('detail-modal')">Cerrar</button>
    </div>
    <div style="height:12px"></div>
  `;
  openModal('detail-modal');
}

function editEntry(id) {
  closeModal('detail-modal');
  const e = state.entries.find(x => x.id === id);
  if (!e) return;
  state.editingId = id;
  state.uploadedFile = e.file || null;
  state.uploadedFileType = e.fileType || null;

  document.getElementById('modal-title').textContent = 'Editar entrada';
  document.getElementById('delete-btn').style.display = 'block';
  document.getElementById('ocr-status').textContent = '';

  selectType(e.type);
  document.getElementById('f-client').value = e.client || '';
  document.getElementById('f-num').value = e.num || '';
  document.getElementById('f-desc').value = e.desc || '';
  document.getElementById('f-date').value = e.date || '';
  document.getElementById('f-base').value = e.base || '';
  document.getElementById('f-iva').value = e.iva ?? 21;
  document.getElementById('f-irpf').value = e.irpf ?? 15;
  document.getElementById('f-status').value = e.status || 'pending';
  document.getElementById('f-category').value = e.category || '';

  if (e.file) {
    renderFilePreview(e.file, e.fileType, e.fileName || 'Documento');
    document.getElementById('ocr-btn').style.display = 'flex';
  } else {
    document.getElementById('file-preview').innerHTML = '';
    document.getElementById('ocr-btn').style.display = 'none';
  }

  calcAmounts();
  openModal('new-modal');
}

function deleteEntry() {
  if (!state.editingId) return;
  state.entries = state.entries.filter(e => e.id !== state.editingId);
  saveState();
  closeModal('new-modal');
  showView(state.currentView);
  showToast('Entrada eliminada');
}

function openModal(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function closeModalOutside(ev, id) { if (ev.target.classList.contains('modal-overlay')) closeModal(id); }

// ============================
// TYPE SELECTOR
// ============================
function selectType(type) {
  state.selectedType = type;
  document.getElementById('opt-income').className = 'type-opt' + (type==='income' ? ' selected-income' : '');
  document.getElementById('opt-expense').className = 'type-opt' + (type==='expense' ? ' selected-expense' : '');
  document.getElementById('f-irpf').parentElement.style.opacity = type === 'income' ? '1' : '0.4';
  document.getElementById('irpf-label').textContent = type === 'income' ? 'retención' : 'N/A';
  calcAmounts();
}

// ============================
// FILE HANDLING
// ============================
function handleFileChange(ev) { if (ev.target.files[0]) processFile(ev.target.files[0]); }
function handleFileDrop(ev) { ev.preventDefault(); document.getElementById('upload-area').classList.remove('dragover'); if (ev.dataTransfer.files[0]) processFile(ev.dataTransfer.files[0]); }

function processFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    state.uploadedFile = e.target.result;
    state.uploadedFileType = file.type;
    state.uploadedFileName = file.name;
    renderFilePreview(e.target.result, file.type, file.name);
    document.getElementById('ocr-btn').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function renderFilePreview(data, type, name) {
  const isImage = type && type.startsWith('image/');
  document.getElementById('file-preview').innerHTML = `
    <div class="uploaded-file">
      <div class="uploaded-thumb">
        ${isImage ? `<img src="${data}" style="width:40px;height:40px;border-radius:6px;object-fit:cover">` : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`}
      </div>
      <div class="uploaded-name">${name || 'Archivo'}</div>
      <button class="uploaded-remove" onclick="removeFile()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
}

function removeFile() {
  state.uploadedFile = null; state.uploadedFileType = null;
  document.getElementById('file-preview').innerHTML = '';
  document.getElementById('ocr-btn').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('ocr-status').textContent = '';
}

// ============================
// OCR WITH CLAUDE AI
// ============================
async function runOCR() {
  if (!state.uploadedFile) return;
  const btn = document.getElementById('ocr-btn');
  const statusEl = document.getElementById('ocr-status');
  btn.style.display = 'none';
  statusEl.innerHTML = '<div class="ocr-processing"><div class="spinner"></div>Analizando documento con IA…</div>';

  try {
    const isImage = state.uploadedFileType && state.uploadedFileType.startsWith('image/');
    const isPDF = state.uploadedFileType === 'application/pdf';
    const base64 = state.uploadedFile.split(',')[1];

    let contentParts = [];
    if (isImage) {
      contentParts = [
        { type: 'image', source: { type: 'base64', media_type: state.uploadedFileType, data: base64 } },
        { type: 'text', text: `Analiza esta factura o tiquet y extrae los datos. Responde SOLO con JSON sin backticks, con este formato exacto:
{
  "client": "nombre del cliente o proveedor",
  "num": "número de factura o referencia",
  "desc": "concepto o descripción del servicio",
  "date": "YYYY-MM-DD",
  "base": 0.00,
  "iva_pct": 21,
  "irpf_pct": 0,
  "type": "income o expense",
  "category": "una de: produccion, postproduccion, fotografia, streaming, equipo, software, transporte, alquiler, suministros, autonomo, otros-ing, otros-gas"
}
Si no encuentras algún dato, usa null. Para type: income si es una factura emitida (venta), expense si es una compra o gasto.` }
      ];
    } else if (isPDF) {
      contentParts = [
        { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
        { type: 'text', text: `Analiza esta factura PDF y extrae los datos. Responde SOLO con JSON sin backticks, con este formato exacto:
{
  "client": "nombre del cliente o proveedor",
  "num": "número de factura o referencia",
  "desc": "concepto o descripción del servicio",
  "date": "YYYY-MM-DD",
  "base": 0.00,
  "iva_pct": 21,
  "irpf_pct": 0,
  "type": "income o expense",
  "category": "una de: produccion, postproduccion, fotografia, streaming, equipo, software, transporte, alquiler, suministros, autonomo, otros-ing, otros-gas"
}
Si no encuentras algún dato, usa null.` }
      ];
    }

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: contentParts }]
      })
    });

    if (!response.ok) throw new Error('API error ' + response.status);
    const data = await response.json();
    const text = data.content.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Fill form
    if (parsed.client) document.getElementById('f-client').value = parsed.client;
    if (parsed.num) document.getElementById('f-num').value = parsed.num;
    if (parsed.desc) document.getElementById('f-desc').value = parsed.desc;
    if (parsed.date) document.getElementById('f-date').value = parsed.date;
    if (parsed.base != null) document.getElementById('f-base').value = parsed.base;
    if (parsed.iva_pct != null) document.getElementById('f-iva').value = parsed.iva_pct;
    if (parsed.irpf_pct != null) document.getElementById('f-irpf').value = parsed.irpf_pct;
    if (parsed.type) selectType(parsed.type);
    if (parsed.category) document.getElementById('f-category').value = parsed.category;
    calcAmounts();

    statusEl.innerHTML = '<span style="color:var(--green)">✓ Datos extraídos correctamente. Revisa y ajusta si hace falta.</span>';
    btn.style.display = 'none';

  } catch (err) {
    console.error(err);
    statusEl.innerHTML = '<span style="color:var(--red)">Error al analizar. Rellena los datos manualmente.</span>';
    btn.style.display = 'flex';
  }
}

// ============================
// SAVE
// ============================
function saveEntry() {
  const client = document.getElementById('f-client').value.trim();
  const base = parseFloat(document.getElementById('f-base').value);
  if (!client) { showToast('Añade un cliente o proveedor'); return; }
  if (!base || base <= 0) { showToast('Introduce la base imponible'); return; }

  const entry = {
    id: state.editingId || uid(),
    type: state.selectedType,
    client,
    num: document.getElementById('f-num').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    date: document.getElementById('f-date').value,
    base,
    iva: parseFloat(document.getElementById('f-iva').value) || 0,
    irpf: parseFloat(document.getElementById('f-irpf').value) || 0,
    status: document.getElementById('f-status').value,
    category: document.getElementById('f-category').value,
    file: state.uploadedFile,
    fileType: state.uploadedFileType,
    fileName: state.uploadedFileName || null
  };

  if (state.editingId) {
    const idx = state.entries.findIndex(e => e.id === state.editingId);
    if (idx >= 0) state.entries[idx] = entry;
  } else {
    state.entries.push(entry);
  }

  saveState();
  closeModal('new-modal');
  showView(state.currentView);
  showToast(state.editingId ? 'Entrada actualizada ✓' : 'Entrada guardada ✓');
  state.editingId = null;
}

// ============================
// TOAST
// ============================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================
// INIT
// ============================
loadState();
document.getElementById('year-badge').textContent = new Date().getFullYear();
showView('dashboard');
</script>
</body>
</html>
